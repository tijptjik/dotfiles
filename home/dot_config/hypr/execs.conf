# Sourced in ~/.config/hypr/hyprland.conf
# #######################
# HYPRLAND :: STARTUP
# #######################

# Author : Mart van de Ven
# Contact : https://type.hk

# WM
exec-once = waybar
exec-once = qs -c hamr
exec-once = $HOME/.config/hypr/scripts/waybar_auto_hide --side bottom &

exec-once = dconf load /org/gnome/desktop/interface/ < ~/.config/dconf/interface.conf

# Ensure Environment Variables Are Available
# hyprlock requires $WAYLAND_DISPLAY to be set in the systemd user environment.
# GDM doesn't always propagate this automatically to systemd.
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP DISPLAY

# Chat
exec-once = /opt/Telegram/Telegram
exec-once = /bin/zapzap
exec-once = flatpak run org.signal.Signal

# Zen // PWA Sites
exec-once = /bin/zen-browser
exec-once = /usr/bin/firefoxpwa site launch 01KVFQER39ASXCZ26D7724G54G
exec-once = /usr/bin/firefoxpwa site launch 01KVFS96FMVBM4QZ9NKX2J01VD

# Terminal
exec-once = /bin/kitty --title "herdr ~" herdr

# Clipboard Management
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Zen Extensions Auto-Float
exec-once = $HOME/.config/hypr/scripts/zen_extensions.fish
